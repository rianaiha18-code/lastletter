<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 | Last Letter</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main class="form-screen">

        <header class="page-header">
            <a href="/" class="back-button">‹</a>
            <h1>新規登録</h1>
        </header>

        <form class="form-area">

            <label for="name">ユーザー名</label>
            <input type="text" id="name" name="name">

            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email">

            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" placeholder="8文字以上の半角英数字">

            <label for="confirm-password">パスワード（確認）</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="再度入力してください">

            <button type="button" class="main-button" onclick="location.href='/home/home.html'">
                登録する
            </button>

        </form>

        <p class="bottom-text">
            すでにアカウントをお持ちの方は
        </p>

        <a href="/auth/login.html" class="bottom-link">
            ログイン
        </a>

    </main>
</body>
</html>

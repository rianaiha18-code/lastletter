<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>パスワード再設定 | Last Letter</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="app-screen">

    <header class="app-header">

        <a
            href="/auth/login.html"
            class="back-button"
            aria-label="ログイン画面へ戻る"
        >
            ‹
        </a>

        <h1>パスワード再設定</h1>

    </header>


    <section class="password-page">

        <div class="password-card">

            <div class="reset-password-icon">
                <i data-lucide="mail-key"></i>
            </div>

            <p class="password-description">
                登録しているメールアドレスを入力してください。
                パスワード再設定用の案内を送信します。
            </p>


            <form id="forgotPasswordForm">

                <div class="form-group">

                    <label for="resetEmail">
                        メールアドレス
                    </label>

                    <input
                        type="email"
                        id="resetEmail"
                        name="email"
                        placeholder="例）sample@example.com"
                        autocomplete="email"
                        required
                    >

                </div>


                <p
                    id="resetError"
                    class="form-error"
                    hidden
                ></p>


                <button
                    type="submit"
                    class="primary-button"
                    id="sendResetButton"
                >
                    確認メールを送信
                </button>

            </form>


            <p class="reset-password-note">
                現在、メール送信機能は開発中です。<br>
                ログインできる場合は、設定画面の
                「パスワード変更」から変更できます。
            </p>

        </div>

    </section>


    <div
        id="toast"
        class="toast"
        role="status"
        aria-live="polite"
    ></div>

</main>


<script src="https://unpkg.com/lucide@latest"></script>
<script src="/js/forgot-password.js"></script>

</body>
</html>

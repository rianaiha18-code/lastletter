<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | Last Letter</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main class="form-screen">

        <header class="page-header">
            <a href="/" class="back-button">‹</a>
            <h1>ログイン</h1>
        </header>

        <form class="form-area">

            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" placeholder="メールアドレスを入力">

            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" placeholder="パスワードを入力">

            <a href="/auth/forgot-password.html" class="forgot-link">
                パスワードを忘れた方はこちら
            </a>

            <button type="button" class="main-button" onclick="location.href='/home/home.html'">
                ログイン
            </button>

        </form>

        <p class="bottom-text">
            アカウントをお持ちでない方は
        </p>

        <a href="/auth/register.html" class="bottom-link">
            新規登録
        </a>

    </main>
</body>
</html>

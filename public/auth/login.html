<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="form-screen">
    <a class="back-link" href="/">←</a>
    <h1 class="page-title">ログイン</h1>
    <p class="page-subtitle">アカウントにログインします</p>

    <form class="form-card">
      <label>メールアドレス</label>
      <input type="email" placeholder="例）sample@example.com">

      <label>パスワード</label>
      <input type="password" placeholder="パスワード">

      <a class="text-link" href="/auth/forgot-password.html">パスワードをお忘れの方はこちら</a>

      <button type="button" class="green" onclick="location.href='/home/home.html'">ログイン</button>
    </form>

    <a class="text-link" href="/auth/register.html">アカウントをお持ちでない方はこちら</a>
  </main>
</body>
</html>

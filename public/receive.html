<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メッセージを受け取る</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="form-screen">
    <a class="back-link" href="/">←</a>
    <h1 class="page-title">メッセージを受け取る</h1>
    <p class="page-subtitle">閲覧コードと合言葉を入力してください</p>

    <form class="form-card">
      <label>閲覧コード</label>
      <input type="text" placeholder="例）ABCD-1234">

      <label>合言葉</label>
      <input type="text" placeholder="例）たからもの">

      <label>任意：今の気持ち</label>
      <textarea placeholder="送り主へ伝えたい気持ちがあれば入力してください"></textarea>

      <button type="button">確認リクエストを送信</button>
    </form>

    <div class="info-box">
      <a href="/info/code-info.html">閲覧コードとは</a>
    </div>
  </main>
</body>
</html>

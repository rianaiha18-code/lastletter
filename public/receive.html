<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>閲覧コード | Last Letter</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="app-screen">

    <header class="app-header">

        <a
            href="/index.html"
            class="back-button"
            aria-label="トップへ戻る"
        >
            ‹
        </a>

        <h1>閲覧コード</h1>

    </header>


    <section class="receive-section">

        <p class="receive-lead">
            大切な人から受け取った<br>
            閲覧コードと合言葉を入力してください。
        </p>


        <form
            class="form-area receive-form"
            id="receiveForm"
        >

            <label for="viewCode">
                閲覧コード
            </label>

            <input
                type="text"
                id="viewCode"
                name="viewCode"
                placeholder="例）ABCD-1234"
                autocomplete="off"
                inputmode="text"
                required
            >


            <label for="viewKeyword">
                合言葉
            </label>

            <input
                type="text"
                id="viewKeyword"
                name="viewKeyword"
                placeholder="例）家族旅行"
                autocomplete="off"
                required
            >


            <p class="help-text">
                ※ 本人確認のため、登録者へ確認通知が送信されます。
            </p>


            <button
                type="button"
                class="main-button"
                id="requestButton"
            >
                確認リクエストを送信
            </button>

        </form>


        <a
            href="/info/code-info.html"
            class="bottom-link"
        >
            閲覧コードとは？
        </a>

    </section>


    <div
        id="toast"
        class="toast"
        role="status"
        aria-live="polite"
    >
        リクエストを送信しました
    </div>

</main>

<script src="/js/receive.js"></script>

</body>
</html>

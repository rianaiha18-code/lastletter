<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>利用規約 | Last Letter</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="app-screen">

    <header class="app-header">

        <a
            href="/setting.html"
            class="back-button"
            aria-label="設定へ戻る"
        >
            ‹
        </a>

        <h1>利用規約</h1>

    </header>


    <section class="policy-page">

        <div class="policy-card">

            <h2>第1条（目的）</h2>

            <p>
                Last Letterは、大切な人へ想いや情報を残すことを目的とした
                終活支援アプリです。
            </p>

        </div>


        <div class="policy-card">

            <h2>第2条（利用者の責任）</h2>

            <p>
                利用者は自己の責任において登録情報を管理し、
                正確な情報を入力するものとします。
            </p>

        </div>


        <div class="policy-card">

            <h2>第3条（禁止事項）</h2>

            <p>
                他者への迷惑行為、法令に違反する行為、
                本サービスの運営を妨げる行為は禁止します。
            </p>

        </div>


        <div class="policy-card">

            <h2>第4条（免責事項）</h2>

            <p>
                本アプリは卒業研究として開発しているため、
                一部機能は開発中です。
                利用により生じた損害について、
                開発者は責任を負いかねます。
            </p>

        </div>


        <div class="policy-card">

            <h2>第5条（規約の変更）</h2>

            <p>
                必要に応じて、本利用規約は予告なく変更する場合があります。
            </p>

        </div>

    </section>

</main>

<script src="https://unpkg.com/lucide@latest"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
});
</script>

</body>
</html>

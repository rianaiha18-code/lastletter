<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>パスワード変更 | Last Letter</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="app-screen">

    <header class="app-header">

        <a
            href="/setting.html"
            class="back-button"
            aria-label="設定へ戻る"
        >
            ‹
        </a>

        <h1>パスワード変更</h1>

    </header>


    <section class="password-page">

        <div class="password-card">

            <p class="password-description">
                本人確認のため現在のパスワードを入力し、
                新しいパスワードを設定してください。
            </p>


            <form id="changePasswordForm">

                <div class="form-group">

                    <label for="currentPassword">
                        現在のパスワード
                    </label>

                    <div class="password-input-wrapper">

                        <input
                            type="password"
                            id="currentPassword"
                            name="currentPassword"
                            autocomplete="current-password"
                            required
                        >

                        <button
                            type="button"
                            class="password-toggle-button"
                            data-target="currentPassword"
                            aria-label="パスワードを表示"
                        >
                            <i data-lucide="eye"></i>
                        </button>

                    </div>

                </div>


                <div class="form-group">

                    <label for="newPassword">
                        新しいパスワード
                    </label>

                    <div class="password-input-wrapper">

                        <input
                            type="password"
                            id="newPassword"
                            name="newPassword"
                            minlength="8"
                            autocomplete="new-password"
                            required
                        >

                        <button
                            type="button"
                            class="password-toggle-button"
                            data-target="newPassword"
                            aria-label="パスワードを表示"
                        >
                            <i data-lucide="eye"></i>
                        </button>

                    </div>

                    <p class="input-note">
                        8文字以上で入力してください。
                    </p>

                </div>


                <div class="form-group">

                    <label for="confirmPassword">
                        新しいパスワード（確認）
                    </label>

                    <div class="password-input-wrapper">

                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            minlength="8"
                            autocomplete="new-password"
                            required
                        >

                        <button
                            type="button"
                            class="password-toggle-button"
                            data-target="confirmPassword"
                            aria-label="パスワードを表示"
                        >
                            <i data-lucide="eye"></i>
                        </button>

                    </div>

                </div>


                <p
                    id="passwordError"
                    class="form-error"
                    hidden
                ></p>


                <button
                    type="submit"
                    class="primary-button"
                    id="changePasswordButton"
                >
                    パスワードを変更
                </button>

            </form>

        </div>

    </section>


    <div
        id="toast"
        class="toast"
        role="status"
        aria-live="polite"
    ></div>

</main>


<script src="https://unpkg.com/lucide@latest"></script>
<script src="/js/auth.js"></script>
<script src="/js/change-password.js"></script>

</body>
</html>

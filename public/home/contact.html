<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>大切な人リスト | Last Letter</title>

    <link
        rel="stylesheet"
        href="/css/style.css"
    >
</head>

<body>

    <main class="app-screen">

        <!-- ヘッダー -->
        <header class="app-header">

            <a
                href="/home/home.html"
                class="back-button"
                aria-label="ホームへ戻る"
            >
                ‹
            </a>

            <h1>大切な人リスト</h1>

        </header>


        <!-- メイン -->
        <section class="contact-form">

            <div class="section-title-row">

                <h2>連絡してほしい人</h2>

                <button
                    type="button"
                    class="add-button"
                    id="addContactButton"
                >
                    ＋追加
                </button>

            </div>


            <p class="section-description">
                自分にもしものことがあった際に、連絡してほしい人を登録できます。
            </p>


            <!-- JSで入力欄を追加する場所 -->
            <div id="contactList"></div>


            <!-- 保存ボタン -->
            <button
                type="button"
                class="main-button"
                id="saveContactButton"
            >
                保存する
            </button>

        </section>


        <!-- 保存完了メッセージ -->
        <div
            id="toast"
            class="toast"
        ></div>


        <!-- フッター -->
        <footer class="bottom-nav">

            <a href="/home/home.html">

                <i
                    data-lucide="house"
                    class="nav-icon"
                ></i>

                <p>ホーム</p>

            </a>


            <a href="/mypage.html">

                <i
                    data-lucide="user-round"
                    class="nav-icon"
                ></i>

                <p>マイページ</p>

            </a>


            <a href="/setting.html">

                <i
                    data-lucide="settings"
                    class="nav-icon"
                ></i>

                <p>設定</p>

            </a>

        </footer>

    </main>


    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 大切な人リスト用JS -->
    <script src="/js/contact.js"></script>

</body>

</html>

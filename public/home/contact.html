<!DOCTYPE html>
<html lang="ja">

  <title>大切な人リスト</title>
  <link rel="stylesheet" href="/css/style.css">

  <main class="app-screen">
    <a class="back-link" href="/home/home.html">←</a>
    <h1 class="page-title">4 大切な人リスト</h1>

    <section class="form-card">
      <label>名前</label>
      <input type="text">

      <label>関係</label>

      <label>メール</label>

      <label>Instagram</label>

      <button type="button">大切な人を追加</button>
      <button type="button" onclick="location.href='/home/message.html'">この人へのメッセージを書く</button>
    </section>

    <footer class="footer-nav">
      <a href="/home/home.html">ホーム</a>

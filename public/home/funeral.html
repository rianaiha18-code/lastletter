<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葬儀リクエスト | Last Letter</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main class="app-screen">

        <header class="app-header">
            <a href="/home/home.html" class="back-button">‹</a>
            <h1>葬儀リクエスト</h1>
        </header>

        <form class="funeral-form">

            <section class="form-section">
                <h2>葬儀について</h2>

                <label>葬儀形式</label>
                <select id="ceremonyType">
                    <option value="">選択してください</option>
                    <option value="家族葬">家族葬</option>
                    <option value="一般葬">一般葬</option>
                    <option value="直葬">直葬</option>
                    <option value="お別れ会">お別れ会</option>
                    <option value="家族に任せる">家族に任せる</option>
                </select>

                <label>葬儀規模</label>
                <select id="funeralScale">
                    <option value="">選択してください</option>
                    <option value="家族のみ">家族のみ</option>
                    <option value="親しい友人まで">親しい友人まで</option>
                    <option value="大学・職場関係まで">大学・職場関係まで</option>
                    <option value="こだわりなし">こだわりなし</option>
                </select>

                <label>使ってほしい遺影写真</label>
                <input
                    type="file"
                    id="funeralPhoto"
                    accept="image/jpeg,image/png,image/webp"
                >
                <p id="savedPhotoTitle" class="saved-photo-title" hidden>
                    現在登録されている遺影
                </p>
                <div class="photo-preview">
                    <img
                        id="photoPreview"
                        alt="遺影プレビュー"
                        hidden
                    >
                </div>
                <button
                    type="button"
                    id="deletePhotoButton"
                    class="delete-photo-button"
                    hidden
                >
                    🗑️ 遺影を削除
                </button>

                <label>棺に一緒に入れてほしい物</label>
                <textarea id="coffinItems"></textarea>

                <label>曲名</label>
                <input type="text" id="bgmSong">

                <label>アーティスト名</label>
                <input type="text" id="bgmArtist">

                <label>理由・思い出</label>
                <textarea id="bgmReason"></textarea>

                <label>供養方法・お骨の行き先</label>
                <select id="ashesDestination">
                    <option value="">選択してください</option>
                    <option value="お墓">お墓</option>
                    <option value="納骨堂">納骨堂</option>
                    <option value="海洋散骨">海洋散骨</option>
                    <option value="手元供養">手元供養</option>
                    <option value="家族に任せる">家族に任せる</option>
                </select>

                <label>残してほしい物</label>
                <textarea id="keepItems"></textarea>

                <label>処分してよい物</label>
                <textarea id="discardItems"></textarea>

                <label>家族へのお願い</label>
                <textarea id="familyMessage"></textarea>
            </section>

            <button
                type="button"
                class="main-button"
                id="saveFuneralButton">
                保存する
            </button>

        </form>

        <footer class="bottom-nav">
            <a href="/home/home.html">
                <span>⌂</span>
                <p>ホーム</p>
            </a>

            <a href="/mypage.html">
                <span>♙</span>
                <p>マイページ</p>
            </a>

            <a href="/setting.html">
                <span>⚙</span>
                <p>設定</p>
            </a>
        </footer>

      <div id="toast" class="toast">
          ✔ 保存しました
      </div>
    </main>
    <script src="/js/auth.js"></script>
    <script src="/js/funeral.js"></script>
</body>
</html>

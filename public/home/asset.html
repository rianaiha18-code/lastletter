<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デジタル資産・契約情報</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="app-screen">
    <a class="back-link" href="/home/home.html">←</a>
    <h1 class="page-title">3 デジタル資産・契約情報</h1>

    <section class="form-card">
      <label>サブスク</label>
      <textarea placeholder="サービス名、メールアドレス、支払方法、解約メモ"></textarea>

      <label>銀行口座</label>
      <textarea placeholder="銀行名、支店、口座種別、用途 ※暗証番号は保存しません"></textarea>

      <label>クレジットカード</label>
      <textarea placeholder="カード会社、引き落とし口座、メモ"></textarea>

      <label>SNS</label>
      <textarea placeholder="Instagram、X、TikTok、Facebookなど"></textarea>

      <label>スマホ</label>
      <textarea placeholder="キャリア、端末名、ロック解除のヒント"></textarea>

      <button type="button">保存する</button>
    </section>

    <footer class="footer-nav">
      <a href="/home/home.html">ホーム</a>
      <a href="/mypage.html">マイページ</a>
      <a href="/setting.html">設定</a>
    </footer>
  </main>
</body>
</html>

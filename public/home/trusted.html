<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>信頼できる人 | Last Letter</title>

    <link
        rel="stylesheet"
        href="/css/style.css"
    >
</head>

<body>

    <main class="app-screen">

        <header class="app-header">

            <a
                href="/home/home.html"
                class="back-button"
                aria-label="ホームへ戻る"
            >
                ‹
            </a>

            <h1>信頼できる人</h1>

        </header>


        <section class="trusted-form">

            <div class="section-title-row">

                <h2>閲覧コード管理人</h2>

                <button
                    type="button"
                    class="add-button"
                    id="addTrustedButton"
                >
                    ＋追加
                </button>

            </div>


            <p class="section-description">
                自分にもしものことがあった際に、閲覧コードを管理してもらう人を登録できます。
            </p>


            <!-- JSで入力欄を追加する場所 -->
            <div id="trustedList"></div>


            <button
                type="button"
                class="main-button"
                id="saveTrustedButton"
            >
                保存する
            </button>


            <div class="code-send-box">

                <h2>閲覧コード一覧を送信</h2>

                <p>
                    登録した信頼できる人へ、相手ごとの閲覧コード一覧をメールで送信します。
                </p>

                <button
                    type="button"
                    class="main-button"
                    id="sendCodesButton"
                >
                    閲覧コード一覧をメール送信
                </button>

            </div>

        </section>


        <div
            id="toast"
            class="toast"
        ></div>


        <footer class="bottom-nav">

            <a href="/home/home.html">

                <i
                    data-lucide="house"
                    class="nav-icon"
                ></i>

                <p>ホーム</p>

            </a>


            <a href="/mypage.html">

                <i
                    data-lucide="user-round"
                    class="nav-icon"
                ></i>

                <p>マイページ</p>

            </a>


            <a href="/setting.html">

                <i
                    data-lucide="settings"
                    class="nav-icon"
                ></i>

                <p>設定</p>

            </a>

        </footer>

    </main>


    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="/js/trusted.js"></script>

</body>

</html>
